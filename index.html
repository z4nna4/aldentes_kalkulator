<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pizza Restaurant Calculator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            background-color: #f9f9f9;\n        }\n        .container {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n        }\n        .card {\n            background-color: #fff;\n            border-radius: 20px;\n            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);\n            width: 80%;\n            max-width: 800px;\n            display: flex;\n        }\n        .products {\n            flex: 2;\n            padding: 20px;\n        }\n        .summary {\n            flex: 1;\n            padding: 20px;\n            border-left: 1px solid #ddd;\n        }\n        h1 {\n            text-align: center;\n        }\n        .tabs {\n            display: flex;\n            justify-content: center;\n        }\n        .tab {\n            margin: 0 10px;\n            padding: 10px 20px;\n            cursor: pointer;\n            background-color: #e0e0e0;\n            border-radius: 5px;\n        }\n        .tab.active {\n            background-color: #c0c0c0;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <div class="card">\n            <div class="products">\n                <h1>Pizza Restaurant Calculator</h1>\n                <div class="tabs">\n                    <div class="tab active">Pizza</div>\n                    <div class="tab">Napoje</div>\n                    <div class="tab">Zestawy</div>\n                </div>\n                <div id="product-list">\n                    <!-- Product items will go here -->\n                </div>\n            </div>\n            <div class="summary">\n                <h2>Order Summary</h2>\n                <div id="summary-details">\n                    <!-- Summary details will go here -->\n                </div>\n            </div>\n        </div>\n    </div>\n    <script>\n        // JavaScript for tab switching and order summary will go here\n    </script>\n</body>\n</html>
